services:
  - type: web
    name: scholar-flow-api
    env: node
    buildCommand: corepack yarn install --immutable && corepack yarn workspace @scholar-flow/backend build
    startCommand: corepack yarn workspace @scholar-flow/backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: scholar-flow-socket
    env: node
    buildCommand: corepack yarn install --immutable && corepack yarn workspace @scholar-flow/socket-server build
    startCommand: corepack yarn workspace @scholar-flow/socket-server start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
