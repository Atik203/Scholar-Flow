services:
  - type: web
    name: scholar-flow-socket
    env: node
    region: oregon
    plan: free
    buildCommand: yarn install && yarn build
    startCommand: yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5001"
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
